<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilogy · Apply for Leave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js" crossorigin="anonymous"></script>
  <style>
    /* ── Design system — matches portal ─────────────────────────────── */
    :root {
      --navy:       #1e1e1e;
      --green:      #4AFD0E;
      --green-light:#edffd6;
      --green-dark: #2a8a00;
      --offwhite:   #F7F6F2;
      --border:     #e2e1dd;
      --surface:    #fff;
      --bg:         #e8e7e3;
      --text:       #1B2A4A;
      --text2:      #4A5568;
      --text3:      #7a8499;
      --radius:     8px;
      --radius-lg:  12px;
      --radius-xl:  16px;
      --red:        #c0392b;
      --orange:     #e67e22;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { overflow-x: hidden; scroll-behavior: smooth; }
    body { font-family: 'Wix Madefor Text', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; margin: 0; }

    /* ── Nav ─────────────────────────────────────────────────────────── */
    .nav { background: var(--navy); height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-logo { height: 28px; }
    .nav-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.15); }
    .nav-section { color: rgba(255,255,255,0.65); font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; }
    .nav-back { color: rgba(255,255,255,0.5); font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .nav-back:hover { color: var(--green); }
    .nav-user { display: flex; align-items: center; gap: 10px; }
    .nav-av { width: 34px; height: 34px; border-radius: 50%; background: var(--green); color: var(--navy); font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav-name { color: rgba(255,255,255,0.8); font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600; }

    /* ── Page layout ─────────────────────────────────────────────────── */
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 32px 64px; }
    .page-head { margin-bottom: 28px; }
    .page-title { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
    .page-sub { color: var(--text3); font-size: 14px; }
    .layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }

    /* ── Balance sidebar ─────────────────────────────────────────────── */
    .balance-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; position: sticky; top: 84px; }
    .balance-head { background: var(--navy); padding: 16px 20px; }
    .balance-head-title { color: var(--green); font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .balance-head-name { color: #fff; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800; }
    .balance-body { padding: 16px 20px; }
    .bal-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .bal-row:last-child { border-bottom: none; }
    .bal-icon { font-size: 20px; flex-shrink: 0; }
    .bal-name { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 2px; }
    .bal-nums { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); line-height: 1; }
    .bal-nums span { font-size: 11px; font-weight: 500; color: var(--text3); }
    .bal-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .bal-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .fil-g { background: var(--green); }
    .fil-b { background: #3b82f6; }
    .fil-o { background: #f59e0b; }
    .fil-p { background: #a855f7; }
    .bal-selected { background: var(--green-light); border-color: var(--green-dark) !important; }
    .bal-row.depleted .bal-nums { color: var(--red); }

    /* ── Manager preview ─────────────────────────────────────────────── */
    .mgr-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 16px 20px; margin-top: 14px; }
    .mgr-label { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    .mgr-info { display: flex; align-items: center; gap: 10px; }
    .mgr-av { width: 38px; height: 38px; border-radius: 50%; background: var(--navy); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .mgr-name { font-weight: 600; font-size: 14px; margin-bottom: 1px; }
    .mgr-role { font-size: 12px; color: var(--text3); }
    .approval-note { margin-top: 10px; padding: 8px 10px; background: #fef3c7; border-radius: var(--radius); font-size: 12px; color: #78350f; line-height: 1.5; }

    /* ── Wizard card ─────────────────────────────────────────────────── */
    .wizard-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }

    /* ── Step indicator ─────────────────────────────────────────────── */
    .steps { display: flex; background: var(--offwhite); border-bottom: 1px solid var(--border); padding: 0; }
    .step-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 8px; gap: 6px; position: relative; }
    .step-item::after { content:''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); height: 1px; width: 50%; background: var(--border); z-index: 0; }
    .step-item:last-child::after { display: none; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); border: 2px solid var(--border); color: var(--text3); font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; transition: all 0.2s; }
    .step-lbl { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); transition: color 0.2s; }
    .step-item.active .step-num { background: var(--navy); border-color: var(--navy); color: #fff; }
    .step-item.active .step-lbl { color: var(--text); }
    .step-item.done .step-num { background: var(--green); border-color: var(--green-dark); color: var(--navy); }
    .step-item.done .step-lbl { color: var(--green-dark); }

    /* ── Step content ─────────────────────────────────────────────────── */
    .step-body { padding: 32px; }
    .step-heading { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .step-sub { color: var(--text3); font-size: 13px; margin-bottom: 28px; line-height: 1.6; }

    /* ── Type selector ─────────────────────────────────────────────────── */
    .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .type-card { border: 2px solid var(--border); border-radius: var(--radius-xl); padding: 20px 16px; cursor: pointer; transition: all 0.18s; text-align: center; background: var(--surface); }
    .type-card:hover { border-color: var(--navy); }
    .type-card.selected { border-color: var(--green-dark); background: var(--green-light); }
    .type-icon { font-size: 32px; margin-bottom: 10px; }
    .type-name { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .type-remain { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 2px; }
    .type-remain.ok { color: var(--green-dark); }
    .type-remain.warn { color: var(--orange); }
    .type-remain.bad { color: var(--red); }
    .type-entitle { font-size: 11px; color: var(--text3); }
    .type-card.selected .type-name { color: var(--green-dark); }

    /* ── Date step ─────────────────────────────────────────────────────── */
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); }
    .form-input { height: 44px; border: 1px solid var(--border); border-radius: var(--radius); padding: 0 14px; font-family: 'Wix Madefor Text', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); transition: border-color 0.15s; outline: none; }
    .form-input:focus { border-color: var(--navy); }
    .form-input.error { border-color: var(--red); }
    .days-badge { background: var(--navy); color: #fff; border-radius: var(--radius-lg); padding: 20px 24px; text-align: center; margin-bottom: 16px; }
    .days-num { font-family: 'Montserrat', sans-serif; font-size: 40px; font-weight: 900; color: var(--green); line-height: 1; }
    .days-label { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .days-note { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .date-warning { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; display: none; }
    .warn-orange { background: #fef3c7; color: #78350f; border: 1px solid #fcd34d; }
    .warn-red { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .warn-green { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green); }

    /* ── Details step ─────────────────────────────────────────────────── */
    .form-textarea { width: 100%; min-height: 100px; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-family: 'Wix Madefor Text', sans-serif; font-size: 14px; color: var(--text); resize: vertical; outline: none; transition: border-color 0.15s; margin-bottom: 20px; }
    .form-textarea:focus { border-color: var(--navy); }

    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--offwhite); }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--navy); background: var(--green-light); }
    .upload-zone.has-file { border-color: var(--green-dark); background: var(--green-light); border-style: solid; }
    .upload-icon { font-size: 32px; margin-bottom: 8px; }
    .upload-title { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .upload-sub { font-size: 12px; color: var(--text3); }
    .upload-input { display: none; }
    .file-preview { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--green-dark); border-radius: var(--radius); }
    .file-icon { font-size: 24px; }
    .file-name { font-weight: 600; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 11px; color: var(--text3); }
    .file-remove { cursor: pointer; color: var(--text3); font-size: 16px; padding: 4px; border-radius: 4px; transition: all 0.15s; }
    .file-remove:hover { color: var(--red); background: #fee2e2; }
    .doc-required { font-size: 12px; color: var(--orange); font-style: italic; margin-top: 8px; }

    /* ── Review step ────────────────────────────────────────────────────── */
    .review-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; }
    .review-item { padding: 14px 18px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
    .review-item:nth-child(2n) { border-right: none; }
    .review-item:nth-last-child(-n+2) { border-bottom: none; }
    .review-key { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
    .review-val { font-size: 14px; font-weight: 600; color: var(--text); }
    .review-impact { background: var(--navy); color: #fff; border-radius: var(--radius-lg); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .impact-item { text-align: center; }
    .impact-num { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 900; line-height: 1; }
    .impact-label { font-size: 10px; font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 3px; }
    .impact-arrow { color: rgba(255,255,255,0.3); font-size: 20px; }
    .ack-row { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px; background: var(--offwhite); border-radius: var(--radius); margin-bottom: 20px; cursor: pointer; }
    .ack-row input[type=checkbox] { width: 16px; height: 16px; margin-top: 1px; accent-color: var(--navy); cursor: pointer; flex-shrink: 0; }
    .ack-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

    /* ── Wizard nav buttons ─────────────────────────────────────────────── */
    .wizard-footer { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-top: 1px solid var(--border); background: var(--offwhite); }
    .btn { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; padding: 11px 24px; border-radius: var(--radius); cursor: pointer; border: none; transition: all 0.18s; }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-submit { background: var(--green); color: var(--navy); font-size: 13px; padding: 13px 32px; }
    .btn-submit:hover { background: #5fff20; }
    .btn-submit:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

    /* ── Success screen ─────────────────────────────────────────────────── */
    .success-screen { padding: 48px 32px; text-align: center; }
    .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success-title { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
    .success-sub { color: var(--text3); font-size: 14px; line-height: 1.7; margin-bottom: 28px; max-width: 440px; margin-left: auto; margin-right: auto; }
    .success-summary { background: var(--offwhite); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; text-align: left; max-width: 440px; margin: 0 auto 28px; }
    .ss-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .ss-row:last-child { border-bottom: none; }
    .ss-key { color: var(--text3); }
    .ss-val { font-weight: 600; color: var(--text); }
    .success-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ── Validation error ───────────────────────────────────────────────── */
    .field-err { font-size: 12px; color: var(--red); margin-top: 4px; display: none; }
    .field-err.show { display: block; }

    /* ── Loading / login screens ───────────────────────────────────────── */
    #login-screen { min-height: 100vh; background: var(--navy); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: #2a2a2a; border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius-xl); padding: 48px 40px; width: 100%; max-width: 420px; text-align: center; }
    .login-logo { height: 34px; margin-bottom: 32px; }
    .login-title { color: #fff; font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .login-sub { color: rgba(255,255,255,0.38); font-size: 14px; margin-bottom: 36px; }
    .btn-ms { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px; background: #fff; color: var(--text); border: none; border-radius: var(--radius); font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-ms:hover { background: #f0f4ff; transform: translateY(-1px); }
    .login-err { margin-top: 12px; background: rgba(192,57,43,0.14); border: 1px solid rgba(192,57,43,0.3); border-radius: var(--radius); padding: 10px; color: #ffa0a0; font-size: 13px; display: none; }
    #loading-overlay { position: fixed; inset: 0; background: var(--navy); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .load-logo { height: 30px; margin-bottom: 32px; }
    .load-spinner { width: 36px; height: 36px; border: 3px solid rgba(74,253,14,0.18); border-top-color: var(--green); border-radius: 50%; animation: spin 0.75s linear infinite; margin-bottom: 16px; }
    .load-txt { color: rgba(255,255,255,0.38); font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .skel { background: linear-gradient(90deg, var(--bg) 25%, var(--border) 50%, var(--bg) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .balance-card { position: static; }
      .type-grid { grid-template-columns: 1fr; }
      .review-grid { grid-template-columns: 1fr; }
      .review-item { border-right: none !important; }
      .nav { padding: 0 16px; }
      .nav-name { display: none; }
      .page { padding: 20px 16px 48px; }
      .step-body { padding: 20px; }
      .wizard-footer { padding: 16px 20px; }
    }
    @media (max-width: 480px) {
      .date-row { grid-template-columns: 1fr; }
      .steps { overflow-x: auto; }
      .impact-arrow { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img src="../../trilogy-logo.png" alt="Trilogy BPO" class="login-logo">
    <div class="login-title">Leave Application</div>
    <div class="login-sub">Sign in with your Trilogy account to continue.</div>
    <button class="btn-ms" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1"  y="1"  width="9" height="9" fill="#F35325"/>
        <rect x="11" y="1"  width="9" height="9" fill="#81BC06"/>
        <rect x="1"  y="11" width="9" height="9" fill="#05A6F0"/>
        <rect x="11" y="11" width="9" height="9" fill="#FFBA08"/>
      </svg>
      Sign in with Microsoft
    </button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay">
  <img src="../../trilogy-logo.png" alt="Trilogy" class="load-logo">
  <div class="load-spinner"></div>
  <div class="load-txt" id="load-txt">Loading…</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <nav class="nav">
    <div class="nav-left">
      <img src="../../trilogy-logo.png" alt="Trilogy BPO" class="nav-logo">
      <div class="nav-divider"></div>
      <div class="nav-section">Leave Application</div>
    </div>
    <div class="nav-user">
      <a class="nav-back" href="../">← Back to Portal</a>
      <div class="nav-divider"></div>
      <div class="nav-av" id="nav-av"></div>
      <span class="nav-name" id="nav-name"></span>
    </div>
  </nav>

  <div class="page">
    <div class="page-head">
      <div class="page-title">Apply for Leave</div>
      <div class="page-sub" id="page-sub">Loading your details…</div>
    </div>

    <div class="layout">

      <!-- ── Sidebar ───────────────────────────────────────────── -->
      <div>
        <div class="balance-card">
          <div class="balance-head">
            <div class="balance-head-title">Your Leave Balance</div>
            <div class="balance-head-name" id="sb-name">Loading…</div>
          </div>
          <div class="balance-body" id="sb-body">
            <div class="skel" style="height:60px;margin-bottom:10px"></div>
            <div class="skel" style="height:60px;margin-bottom:10px"></div>
            <div class="skel" style="height:60px"></div>
          </div>
        </div>

        <div class="mgr-card">
          <div class="mgr-label">📨 Approval goes to</div>
          <div class="mgr-info" id="mgr-info">
            <div class="skel" style="width:38px;height:38px;border-radius:50%;flex-shrink:0"></div>
            <div style="flex:1"><div class="skel" style="height:14px;margin-bottom:6px"></div><div class="skel" style="height:11px;width:60%"></div></div>
          </div>
          <div class="approval-note" id="approval-note" style="display:none"></div>
        </div>
      </div>

      <!-- ── Wizard ────────────────────────────────────────────── -->
      <div class="wizard-card">

        <!-- Step indicator -->
        <div class="steps" id="steps">
          <div class="step-item active" data-step="1">
            <div class="step-num">1</div>

          </div>

            <div class="step-num">3</div>
            <div class="step-lbl">Details</div>
          </div>
          <div class="step-item" data-step="4">
            <div class="step-num">4</div>
            <div class="step-lbl">Review</div>

        <div id="step-content"></div>

        <!-- Wizard footer (hidden on success) -->
        <div class="wizard-footer" id="wizard-footer">
          <button class="btn btn-ghost" id="btn-back" onclick="prevStep()" style="visibility:hidden">← Back</button>
          <button class="btn btn-primary" id="btn-next" onclick="nextStep()">Continue →</button>
        </div>

      </div>

</div>

<script>
'use strict';

// ── CONFIG ────────────────────────────────────────────────────────────
const CONFIG = {
  azureClientId: '4b515ddf-72b9-43eb-b36b-82fc69296a7c',
  azureTenantId: '77cde95f-930f-495e-89c6-4d2c30f6df21',
  redirectUri:   'https://portal.trilogybpo.com/leave/',
  hrBase:        'https://hr.trilogybpo.com',
};

const FLOWS = {
  GET_EMPLOYEES: 'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/845f7381bca24e189eb44725203089dd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QrjlEFKXktx5JYxWNb8LgUJAxi8TGzHqLjXh0RriG0U',
  GET_DETAIL:    'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6b82b43d3cc048efb566f7ff40093ad8/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=iqilALe0lU6amkgr8t_Y-zIIUjaefCz2qgeQjEeys9c',
  SAVE_LEAVE:    'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2f9acaa0f0254a72a662cbf4541f4da3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=6K_5uXvdvOz7pFfDeQtwhdqfRSxmxz1Ib_sfZHHSD4k',
};

// Graph scopes — Files.ReadWrite needed for document upload to OneDrive
const SCOPES = ['User.Read', 'Mail.ReadBasic', 'Files.ReadWrite'];

// SA Public Holidays 2026 (for working-days calculation)
const HOLIDAYS = new Set([
  '2026-01-01','2026-03-21','2026-04-03','2026-04-06',
  '2026-04-27','2026-05-01','2026-06-16','2026-08-09',
  '2026-09-24','2026-12-16','2026-12-25','2026-12-26',
]);

// ── STATE ─────────────────────────────────────────────────────────────
const S = {
  step:       1,
  graphToken: null,
  employee:   null,
  detail:     null,
  manager:    null,
  leave:      null,     // calculated leave balances
  // form
  leaveType:  null,     // 'Annual'|'Sick'|'Family'
  startDate:  null,
  endDate:    null,
  days:       0,
  reason:     '',
  file:       null,
  fileUrl:    null,
  ack:        false,
};

// ── MSAL ──────────────────────────────────────────────────────────────
let msalApp;

async function ensureMsal() {
  if (msalApp) return msalApp;
  if (!window.msal) throw new Error('MSAL library failed to load.');
  msalApp = new msal.PublicClientApplication({
    auth: {
      clientId:    CONFIG.azureClientId,
      authority:   'https://login.microsoftonline.com/' + CONFIG.azureTenantId,
      redirectUri: CONFIG.redirectUri,
    },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: true },
  });
  return msalApp;
}

async function init() {
  try {
    await ensureMsal();
    const resp = await msalApp.handleRedirectPromise();
    if (resp) { await loadApp(resp.account); return; }
    const accounts = msalApp.getAllAccounts();
    if (accounts.length) { await loadApp(accounts[0]); }
    else { show('login-screen'); }
  } catch (e) { console.error('Init:', e); show('login-screen'); }
}

async function signIn() {
  document.getElementById('login-err').style.display = 'none';
  try {
    await ensureMsal();
    await msalApp.loginRedirect({ scopes: SCOPES });
  } catch (e) {
    const el = document.getElementById('login-err');
    el.textContent = e.message || 'Sign-in failed.';
    el.style.display = 'block';
  }
}

// ── DATA LOAD ─────────────────────────────────────────────────────────
async function loadApp(account) {
  show('loading');
  setLoad('Signing you in…');
  try {
    const token = await msalApp.acquireTokenSilent({ scopes: SCOPES, account })
      .catch(() => msalApp.acquireTokenRedirect({ scopes: SCOPES, account }));
    S.graphToken = token.accessToken;

    setLoad('Loading your details…');
    const raw = await callFlow(FLOWS.GET_EMPLOYEES);
    const all = Array.isArray(raw) ? raw : (raw.employees || raw.value || []);

    const email = (account.username || '').toLowerCase();
    S.employee = all.find(e =>
      (e.WorkEmail || '').toLowerCase() === email ||
      (e.PersonalEmail || '').toLowerCase() === email
    );
    if (!S.employee) throw new Error(`No HR record found for ${account.username}. Contact HR.`);

    setLoad('Loading leave data…');
    try {
      S.detail = await callFlow(FLOWS.GET_DETAIL, {
        EmployeeID: S.employee.EmployeeID,
        employeeId: S.employee.EmployeeID,
      });
    } catch { S.detail = {}; }

    S.manager = all.find(m => m.EmployeeID == S.employee.ReportsTo) || null;
    S.leave   = calcLeave(S.employee, S.detail);

    show('app');
    renderSidebar();
    renderStep(1);

  } catch (e) {
    console.error('loadApp:', e);
    show('login-screen');
    const el = document.getElementById('login-err');
    el.textContent = e.message || 'Failed to load. Please try again.';
    el.style.display = 'block';
  }
}

// ── UTILITIES ─────────────────────────────────────────────────────────
function show(id) {
  ['login-screen','loading-overlay','app'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = s === id ? (s === 'loading-overlay' ? 'flex' : (s === 'app' ? 'block' : 'flex')) : 'none';
  });
}
function setLoad(t) { document.getElementById('load-txt').textContent = t; }

function initials(n) { return (n||'??').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function fmtDate(d)  { if (!d) return '—'; return new Date(d+'T12:00:00').toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'}); }

function unwrap(d) { return d.body ? (typeof d.body==='string' ? JSON.parse(d.body) : d.body) : d; }
async function callFlow(url, body={}) {
  const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!r.ok) {
    const errText = await r.text().catch(() => '');
    console.error('Flow error', r.status, errText);
    throw new Error('Flow ' + r.status + (errText ? ': ' + errText.slice(0,200) : ''));
  }
  return unwrap(await r.json());
}

function prorateAnnual(entitlement, startDate) {
  if (!startDate) return entitlement;
  const start = new Date(startDate);
  const now   = new Date();
  let ann = new Date(now.getFullYear(), start.getMonth(), start.getDate());
  if (ann > now) ann = new Date(now.getFullYear() - 1, start.getMonth(), start.getDate());
  const months = (now.getFullYear() - ann.getFullYear()) * 12 + (now.getMonth() - ann.getMonth());
  const accrued = (Math.min(months, 12) / 12) * entitlement;
  return Math.round(accrued * 100) / 100;
}

function calcLeave(emp, det) {
  const total = prorateAnnual(emp.AnnualLeaveEntitlement || 15, emp.StartDate);
  return {
    annual:   { taken: det.annual_taken||0,   total,  remaining: Math.max(0, total-(det.annual_taken||0)) },
    sick:     { taken: det.sick_taken||0,     total: 30, remaining: Math.max(0, 30-(det.sick_taken||0)) },
    family:   { taken: det.family_taken||0,   total: 3,  remaining: Math.max(0, 3-(det.family_taken||0)) },
    parental: { taken: det.parental_taken||0, total: 10, remaining: Math.max(0, 10-(det.parental_taken||0)) },
  };
}

function workingDays(startStr, endStr) {
  if (!startStr || !endStr) return 0;
  const s = new Date(startStr+'T12:00:00');
  const e = new Date(endStr+'T12:00:00');
  if (e < s) return 0;
  let count = 0;
  const d = new Date(s);
  while (d <= e) {
    const dow = d.getDay();
    const ds  = d.toISOString().split('T')[0];
    if (dow !== 0 && dow !== 6 && !HOLIDAYS.has(ds)) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}

function leaveKey(type) {
  if (!type) return null;
  if (type === 'Annual')   return 'annual';
  if (type === 'Sick')     return 'sick';
  if (type === 'Parental') return 'parental';
  return 'family';
}

function remaining(type) {
  const k = leaveKey(type);
  return k ? S.leave[k].remaining : 0;
}

function remainClass(r, total) {
  const p = r / total;
  return p > 0.4 ? 'ok' : p > 0.15 ? 'warn' : 'bad';
}

function pBar(pct, cls) {
  return `<div class="bal-bar"><div class="bal-fill ${cls}" style="width:0%" data-w="${Math.min(100,pct).toFixed(1)}%"></div></div>`;
}
function animBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.bal-fill[data-w]').forEach(el => { el.style.width = el.dataset.w; });
  });
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function minDateStr(daysAhead=0) {
  const d = new Date(); d.setDate(d.getDate()+daysAhead);
  return d.toISOString().split('T')[0];
}

// ── SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  const e = S.employee;
  const l = S.leave;

  document.getElementById('nav-av').textContent   = initials(e.FirstName+' '+e.LastName);
  document.getElementById('nav-name').textContent  = e.FirstName;
  document.getElementById('sb-name').textContent   = e.FirstName+' '+e.LastName;
  document.getElementById('page-sub').textContent  = (e.JobTitle||'Employee')+' · '+e.Campaign;

  const aP = (l.annual.taken/l.annual.total)*100;
  const sP = (l.sick.taken/l.sick.total)*100;
  const fP = (l.family.taken/l.family.total)*100;

  document.getElementById('sb-body').innerHTML = `
    <div class="bal-row" id="bal-annual">
      <div class="bal-icon">🌴</div>
      <div style="flex:1">
        <div class="bal-name">Annual Leave</div>
        <div class="bal-nums ${remainClass(l.annual.remaining,l.annual.total)}">${l.annual.remaining} <span>of ${l.annual.total} days remaining</span></div>
        ${pBar(aP,'fil-g')}
      </div>
    </div>
    <div class="bal-row" id="bal-sick">
      <div class="bal-icon">🤒</div>
      <div style="flex:1">
        <div class="bal-name">Sick Leave</div>
        <div class="bal-nums ${remainClass(l.sick.remaining,l.sick.total)}">${l.sick.remaining} <span>of 30 days remaining</span></div>
        ${pBar(sP,'fil-b')}
      </div>
    </div>
    <div class="bal-row" id="bal-family">
      <div class="bal-icon">👨‍👩‍👧</div>
      <div style="flex:1">
        <div class="bal-name">Family Responsibility</div>
        <div class="bal-nums ${remainClass(l.family.remaining,l.family.total)}">${l.family.remaining} <span>of 3 days remaining</span></div>
        ${pBar(fP,'fil-o')}
      </div>
    </div>
    <div class="bal-row" id="bal-parental">
      <div class="bal-icon">👶</div>
      <div style="flex:1">
        <div class="bal-name">Parental Leave</div>
        <div class="bal-nums ${remainClass(l.parental.remaining,l.parental.total)}">${l.parental.remaining} <span>of 10 days remaining</span></div>
        ${pBar((l.parental.taken/l.parental.total)*100,'fil-p')}
      </div>
    </div>`;
  setTimeout(animBars, 80);

  // Manager card
  const mgrInfo = document.getElementById('mgr-info');
  const mgrNote = document.getElementById('approval-note');
  if (S.manager) {
    mgrInfo.innerHTML = `
      <div class="mgr-av">${initials(S.manager.FirstName+' '+S.manager.LastName)}</div>
      <div>
        <div class="mgr-name">${S.manager.FirstName} ${S.manager.LastName}</div>
        <div class="mgr-role">${S.manager.JobTitle||'Manager'}</div>
      </div>`;
    mgrNote.textContent = 'Your leave request will be emailed to '+S.manager.FirstName+' for approval. You\'ll be notified of their decision.';
    mgrNote.style.display = 'block';
  } else {
    mgrInfo.innerHTML = `<div style="font-size:13px;color:var(--text3)">No manager assigned. Leave will be submitted to HR.</div>`;
    mgrNote.style.display = 'none';
  }
}

function highlightBalance(type) {
  ['annual','sick','family'].forEach(k => {
    const el = document.getElementById('bal-'+k);
    if (el) el.classList.remove('bal-selected');
  });
  const map = { Annual:'annual', Sick:'sick', Family:'family', Parental:'parental' };
  const el = document.getElementById('bal-'+map[type]);
  if (el) el.classList.add('bal-selected');
}

// ── STEP RENDERING ────────────────────────────────────────────────────
function updateStepIndicator(current) {
  document.querySelectorAll('.step-item').forEach(el => {
    const n = parseInt(el.dataset.step);
    el.classList.toggle('active', n === current);
    el.classList.toggle('done',   n < current);
  });
  const back = document.getElementById('btn-back');
  const next = document.getElementById('btn-next');
  back.style.visibility = current > 1 ? 'visible' : 'hidden';
  next.style.display = 'block';
}

function renderStep(n) {
  S.step = n;
  updateStepIndicator(n);
  const body = document.getElementById('step-content');
  const footer = document.getElementById('wizard-footer');
  footer.style.display = 'flex';
  if (n === 1) body.innerHTML = step1HTML();
  if (n === 2) { body.innerHTML = step2HTML(); bindDateListeners(); }
  if (n === 3) { body.innerHTML = step3HTML(); bindFileListeners(); }
  if (n === 4) { body.innerHTML = step4HTML(); bindAck(); updateSubmitBtn(); }
  if (n === 5) { body.innerHTML = successHTML(); footer.style.display = 'none'; }
}

// ── STEP 1 — LEAVE TYPE ───────────────────────────────────────────────
function step1HTML() {
  const l = S.leave;
  function card(type, icon, name, rem, total, desc) {
    const cls = S.leaveType === type ? 'type-card selected' : 'type-card';
    const rCls = remainClass(rem, total);
    return `<div class="${cls}" onclick="selectType('${type}')">
      <div class="type-icon">${icon}</div>
      <div class="type-name">${name}</div>
      <div class="type-remain ${rCls}">${rem}</div>
      <div class="type-entitle">${desc}</div>
    </div>`;
  }
  return `<div class="step-body">
    <div class="step-heading">What type of leave?</div>
    <div class="step-sub">Select the leave type that applies. Your remaining balance is shown on each option.</div>
    <div class="type-grid">
      ${card('Annual','🌴','Annual Leave',l.annual.remaining,l.annual.total, l.annual.remaining+' days remaining · '+l.annual.total+' day entitlement')}
      ${card('Sick','🤒','Sick Leave',l.sick.remaining,l.sick.total,'BCEA cycle · 30 days per 3 years')}
      ${card('Family','👨‍👩‍👧','Family Responsibility',l.family.remaining,l.family.total,'3 days per year · immediate family')}
      ${card('Parental','👶','Parental Leave',l.parental.remaining,l.parental.total,'10 days · BCEA parental entitlement')}
    </div>
    ${S.leaveType ? '' : '<div style="margin-top:16px;font-size:12px;color:var(--text3);text-align:center">Select a leave type to continue</div>'}
  </div>`;
}

function selectType(type) {
  S.leaveType = type;
  highlightBalance(type);
  renderStep(1);
  document.getElementById('btn-next').disabled = false;
}

// ── STEP 2 — DATES ────────────────────────────────────────────────────
function step2HTML() {
  const days = S.days || 0;
  const rem  = remaining(S.leaveType);
  const insufficient = days > 0 && days > rem;
  const isWeekend    = days === 0 && S.startDate && S.endDate;

  return `<div class="step-body">
    <div class="step-heading">Select your dates</div>
    <div class="step-sub">Weekends and South African public holidays are automatically excluded from the working day count.</div>

    <div class="date-row">
      <div class="form-group">
        <label class="form-label">Start Date</label>
        <input type="date" class="form-input" id="inp-start" value="${S.startDate||''}" min="${todayStr()}" onchange="onDateChange()">
        <div class="field-err" id="err-start"></div>
      </div>
      <div class="form-group">
        <label class="form-label">End Date</label>
        <input type="date" class="form-input" id="inp-end" value="${S.endDate||''}" min="${S.startDate||todayStr()}" onchange="onDateChange()">
        <div class="field-err" id="err-end"></div>
      </div>
    </div>

    <div class="days-badge">
      <div class="days-num" id="days-num">${days > 0 ? days : '—'}</div>
      <div class="days-label">Working Day${days !== 1 ? 's' : ''}</div>
      <div class="days-note" id="days-note">${days > 0 ? 'Weekends &amp; public holidays excluded' : 'Select both dates to calculate'}</div>
    </div>

    <div class="date-warning warn-red"    id="warn-insufficient" style="${insufficient?'display:block':''}">
      ⚠️ You only have <strong>${rem} day${rem!==1?'s':''}</strong> of ${S.leaveType} Leave remaining. This request requires ${days} days.
    </div>
    <div class="date-warning warn-orange" id="warn-zero" style="${isWeekend?'display:block':''}">
      ⚠️ No working days in the selected range. Please adjust your dates.
    </div>
    <div class="date-warning warn-green"  id="warn-ok" style="${days > 0 && !insufficient?'display:block':''}">
      ✓ ${days} working day${days!==1?'s':''} requested · ${rem - days} day${(rem-days)!==1?'s':''} remaining after approval
    </div>
  </div>`;
}

function bindDateListeners() {
  ['inp-start','inp-end'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', onDateChange);
  });
}

function onDateChange() {
  const s = document.getElementById('inp-start')?.value;
  const e = document.getElementById('inp-end')?.value;
  if (s) S.startDate = s;
  if (e) S.endDate   = e;
  if (S.startDate && S.endDate) {
    S.days = workingDays(S.startDate, S.endDate);
    const rem = remaining(S.leaveType);
    const insufficient = S.days > rem;
    document.getElementById('days-num').textContent = S.days > 0 ? S.days : '—';
    document.getElementById('days-note').textContent = S.days > 0 ? 'Weekends & public holidays excluded' : 'No working days in range';
    document.getElementById('warn-insufficient').style.display = (S.days > 0 && insufficient) ? 'block' : 'none';
    document.getElementById('warn-zero').style.display  = (S.days === 0) ? 'block' : 'none';
    document.getElementById('warn-ok').style.display    = (S.days > 0 && !insufficient) ? 'block' : 'none';
    if (document.getElementById('warn-ok').style.display !== 'none') {
      document.getElementById('warn-ok').textContent =
        `✓ ${S.days} working day${S.days!==1?'s':''} requested · ${rem - S.days} day${(rem-S.days)!==1?'s':''} remaining after approval`;
    }
  }
  const endEl = document.getElementById('inp-end');
  if (endEl && S.startDate) endEl.min = S.startDate;
}

// ── STEP 3 — DETAILS & DOCS ───────────────────────────────────────────
function step3HTML() {
  const sickRequired = S.leaveType === 'Sick' || S.leaveType === 'Parental';
  const fileBlock = S.file
    ? `<div class="file-preview">
        <div class="file-icon">${fileIcon(S.file.name)}</div>
        <div>
          <div class="file-name">${S.file.name}</div>
          <div class="file-size">${(S.file.size/1024).toFixed(0)} KB</div>
        </div>
        <div class="file-remove" onclick="removeFile()" title="Remove">✕</div>
       </div>`
    : `<div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">📎</div>
        <div class="upload-title">Click to upload or drag &amp; drop</div>
        <div class="upload-sub">PDF, JPG, PNG, DOCX · Max 5 MB</div>
       </div>
       <input type="file" class="upload-input" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" onchange="onFileSelect(event)">`;

  return `<div class="step-body">
    <div class="step-heading">Reason &amp; documentation</div>
    <div class="step-sub">Give a brief reason for your leave request${sickRequired?' and attach your doctor\'s note':' (supporting documents are recommended for sick and parental leave)'}.</div>

    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">Reason for leave <span style="color:var(--red)">*</span></label>
      <textarea class="form-textarea" id="inp-reason" placeholder="Briefly describe the reason for your leave request…" maxlength="500">${S.reason}</textarea>
      <div class="field-err" id="err-reason"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Supporting Document ${sickRequired?'<span style="color:var(--red)">*</span>':'<span style="color:var(--text3)">(recommended)</span>'}</label>
      ${fileBlock}
      ${sickRequired && !S.file ? '<div class="doc-required">⚕️ Doctor\'s note is required for sick leave</div>' : ''}
    </div>
  </div>`;
}

function bindFileListeners() {
  const drop = document.getElementById('drop-zone');
  if (!drop) return;
  drop.addEventListener('dragover',  e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });
}

function fileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  return ext==='pdf'?'📄':ext==='doc'||ext==='docx'?'📝':ext==='jpg'||ext==='jpeg'||ext==='png'?'🖼️':'📎';
}

function onFileSelect(evt) {
  const f = evt.target.files[0];
  if (f) setFile(f);
}

function setFile(f) {
  if (f.size > 5*1024*1024) { alert('File must be under 5 MB.'); return; }
  S.file = f; S.fileUrl = null;
  renderStep(3);
}

function removeFile() { S.file = null; S.fileUrl = null; renderStep(3); }

// ── STEP 4 — REVIEW ───────────────────────────────────────────────────
function step4HTML() {
  const rem   = remaining(S.leaveType);
  const after = rem - S.days;
  const typeFull = S.leaveType==='Annual'?'Annual Leave':S.leaveType==='Sick'?'Sick Leave':'Family Responsibility Leave';
  const mgrName = S.manager ? `${S.manager.FirstName} ${S.manager.LastName}` : 'HR Department';

  return `<div class="step-body">
    <div class="step-heading">Review your request</div>
    <div class="step-sub">Please check your details carefully before submitting. Once submitted, your manager will be notified for approval.</div>

    <div class="review-grid">
      <div class="review-item"><div class="review-key">Leave Type</div><div class="review-val">${typeFull}</div></div>
      <div class="review-item"><div class="review-key">Working Days</div><div class="review-val">${S.days} day${S.days!==1?'s':''}</div></div>
      <div class="review-item"><div class="review-key">From</div><div class="review-val">${fmtDate(S.startDate)}</div></div>
      <div class="review-item"><div class="review-key">To</div><div class="review-val">${fmtDate(S.endDate)}</div></div>
      <div class="review-item"><div class="review-key">Reason</div><div class="review-val">${S.reason||'—'}</div></div>
      <div class="review-item"><div class="review-key">Document</div><div class="review-val">${S.file ? S.file.name : 'None attached'}</div></div>
      <div class="review-item"><div class="review-key">Approval sent to</div><div class="review-val">${mgrName}</div></div>
      <div class="review-item"><div class="review-key">Status after submit</div><div class="review-val">⏳ Pending approval</div></div>
    </div>

    <div class="review-impact">
      <div class="impact-item"><div class="impact-num">${rem}</div><div class="impact-label">Days now</div></div>
      <div class="impact-arrow">→</div>
      <div class="impact-item"><div class="impact-num" style="color:var(--green)">${S.days}</div><div class="impact-label">Days requested</div></div>
      <div class="impact-arrow">→</div>
      <div class="impact-item"><div class="impact-num" style="color:${after<5?'#fc8181':after<8?'#f6ad55':'#9ae6b4'}">${after}</div><div class="impact-label">Days remaining</div></div>
    </div>

    <label class="ack-row">
      <input type="checkbox" id="ack-check" onchange="onAck()" ${S.ack?'checked':''}>
      <div class="ack-text">I confirm that the information above is accurate and I understand that submitting a false or fraudulent leave request may result in disciplinary action.</div>
    </label>

    <div style="text-align:center">
      <button class="btn btn-submit" id="btn-submit" onclick="submitLeave()" ${!S.ack?'disabled':''}>
        📤 Submit Leave Request
      </button>
    </div>
  </div>`;
}

function bindAck() {
  const cb = document.getElementById('ack-check');
  if (cb) cb.addEventListener('change', onAck);
}
function onAck() { S.ack = document.getElementById('ack-check')?.checked; updateSubmitBtn(); }
function updateSubmitBtn() {
  const btn = document.getElementById('btn-submit');
  if (btn) btn.disabled = !S.ack;
}

// ── STEP 5 — SUCCESS ──────────────────────────────────────────────────
function successHTML() {
  const typeFull = S.leaveType==='Annual'?'Annual Leave':S.leaveType==='Sick'?'Sick Leave':'Family Responsibility Leave';
  const mgrName = S.manager ? S.manager.FirstName : 'your manager';
  const ref = 'LV-' + Date.now().toString(36).toUpperCase().slice(-6);
  return `<div class="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">Leave Request Submitted</div>
    <div class="success-sub">Your request has been sent to ${mgrName} for approval. You will receive an email notification once a decision has been made.</div>
    <div class="success-summary">
      <div class="ss-row"><span class="ss-key">Reference</span><span class="ss-val">${ref}</span></div>
      <div class="ss-row"><span class="ss-key">Type</span><span class="ss-val">${typeFull}</span></div>
      <div class="ss-row"><span class="ss-key">From</span><span class="ss-val">${fmtDate(S.startDate)}</span></div>
      <div class="ss-row"><span class="ss-key">To</span><span class="ss-val">${fmtDate(S.endDate)}</span></div>
      <div class="ss-row"><span class="ss-key">Days</span><span class="ss-val">${S.days} working day${S.days!==1?'s':''}</span></div>
      <div class="ss-row"><span class="ss-key">Status</span><span class="ss-val">⏳ Pending approval</span></div>
    </div>
    <div class="success-actions">
      <a href="../" class="btn btn-primary">← Back to Portal</a>
      <button class="btn btn-ghost" onclick="resetForm()">Apply for another</button>
    </div>
  </div>`;
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function nextStep() {
  if (!validateStep(S.step)) return;
  renderStep(S.step + 1);
}

function prevStep() {
  if (S.step > 1) renderStep(S.step - 1);
}

function validateStep(n) {
  if (n === 1) {
    if (!S.leaveType) { alert('Please select a leave type.'); return false; }
    return true;
  }
  if (n === 2) {
    if (!S.startDate) { showFieldErr('err-start', 'Please select a start date.'); return false; }
    if (!S.endDate)   { showFieldErr('err-end',   'Please select an end date.'); return false; }
    if (S.endDate < S.startDate) { showFieldErr('err-end', 'End date must be on or after start date.'); return false; }
    if (S.days === 0) { alert('No working days in the selected range. Please adjust your dates.'); return false; }
    if (S.days > remaining(S.leaveType)) {
      if (!confirm(`You only have ${remaining(S.leaveType)} day(s) of ${S.leaveType} Leave remaining but are requesting ${S.days}. Continue anyway?`)) return false;
    }
    return true;
  }
  if (n === 3) {
    const reason = document.getElementById('inp-reason')?.value?.trim() || '';
    if (!reason) { showFieldErr('err-reason', 'Please provide a reason for your leave.'); return false; }
    S.reason = reason;
    if (S.leaveType === 'Sick' && !S.file) {
      if (!confirm('No doctor\'s note attached. Are you sure you want to continue without supporting documentation?')) return false;
    }
    return true;
  }
  return true;
}

function showFieldErr(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.classList.add('show'); }
}

// ── SUBMIT ────────────────────────────────────────────────────────────
async function submitLeave() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '⏳ Submitting…';

  try {
    // 1. Upload document to OneDrive if attached
    if (S.file) {
      try {
        btn.textContent = '⏳ Uploading document…';
        const safeName = `LeaveDoc_${S.employee.EmployeeID}_${S.startDate}_${S.file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
        const uploadUrl = `https://graph.microsoft.com/v1.0/me/drive/root:/LeaveDocuments/${safeName}:/content`;
        const upResp = await fetch(uploadUrl, {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer '+S.graphToken, 'Content-Type': S.file.type||'application/octet-stream' },
          body: S.file
        });
        if (upResp.ok) {
          const upData = await upResp.json();
          S.fileUrl = upData.webUrl || null;
        } else {
          console.warn('Document upload failed:', upResp.status, '— continuing without URL');
        }
      } catch (upErr) {
        console.warn('Document upload error:', upErr, '— continuing without URL');
      }
    }

    // 2. Call SAVE_LEAVE flow
    btn.textContent = '⏳ Saving request…';
    // All values as strings — matches the flow's JSON schema (all fields typed as string)
    const payload = {
      employee_id:   String(S.employee.EmployeeID),
      leave_type:    S.leaveType === 'Annual'   ? 'Annual Leave'   :
                     S.leaveType === 'Sick'      ? 'Sick Leave'     :
                     S.leaveType === 'Parental'  ? 'Parental Leave' : 'Family Responsibility',
      start_date:    S.startDate,
      end_date:      S.endDate,
      days:          String(S.days),
      status:        'Pending',
      reason:        S.reason,
      // Extra fields for the email notification step in the flow
      employee_name: S.employee.FirstName + ' ' + S.employee.LastName,
      manager_name:  S.manager ? S.manager.FirstName + ' ' + S.manager.LastName : '',
      manager_email: S.manager ? (S.manager.WorkEmail || S.manager.PersonalEmail || '') : '',
    };

    await callFlow(FLOWS.SAVE_LEAVE, payload);

    // 3. Success
    renderStep(5);

  } catch (e) {
    console.error('Submit error:', e);
    btn.disabled = false;
    btn.textContent = '📤 Submit Leave Request';
    alert('Submission failed: '+e.message+'\n\nPlease try again or contact HR.');
  }
}

function resetForm() {
  S.step = 1; S.leaveType = null; S.startDate = null; S.endDate = null;
  S.days = 0; S.reason = ''; S.file = null; S.fileUrl = null; S.ack = false;
  document.getElementById('wizard-footer').style.display = 'flex';
  ['annual','sick','family'].forEach(k => {
    const el = document.getElementById('bal-'+k);
    if (el) el.classList.remove('bal-selected');
  });
  renderStep(1);
}

// ── BOOT ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
