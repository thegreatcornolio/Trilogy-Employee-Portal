<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trilogy · Manage My Team</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.0.0/lib/msal-browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1e1e1e;--green:#4AFD0E;--green-light:#edffd6;--green-dark:#2a8a00;
  --bg:#e8e7e3;--surface:#fff;--surface2:#f4f3ef;--border:#e2e1dd;--border2:#c8c7c3;
  --text:#1B2A4A;--text2:#4A5568;--text3:#7a8499;--red:#c0392b;--orange:#e67e22;--blue:#2980b9;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
}
body{font-family:'Wix Madefor Text',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.nav{background:var(--navy);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.nav-logo{height:26px}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-sec{color:rgba(255,255,255,.6);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase}
.nav-back{color:rgba(255,255,255,.55);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;text-decoration:none}
.nav-back:hover{color:var(--green)}
.shell{max-width:1000px;margin:0 auto;padding:2rem 1.5rem 5rem}
.page-title{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:800;margin-bottom:2px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:1.75rem}
.emp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);margin-bottom:14px;overflow:hidden}
.emp-head{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:background .15s}
.emp-head:hover{background:var(--surface2)}
.emp-av{width:44px;height:44px;border-radius:50%;background:var(--navy);color:#fff;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.emp-name{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700}
.emp-role{font-size:12px;color:var(--text3)}
.emp-pending{margin-left:auto;display:flex;align-items:center;gap:10px}
.pending-pill{background:#fef3c7;color:#92400e;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px}
.chev{color:var(--text3);font-size:18px;transition:transform .2s}
.emp-card.open .chev{transform:rotate(90deg)}
.emp-body{display:none;border-top:1px solid var(--border);padding:18px 20px;background:var(--surface2)}
.emp-card.open .emp-body{display:block}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.act-btn{flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius);background:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--text)}
.act-btn:hover{border-color:var(--navy)}
.act-btn.primary{background:var(--green);border-color:var(--green);color:#111}
.act-btn.danger{color:var(--red);border-color:#f0c0bb}
.act-btn.danger:hover{background:#fdf0ef}
.panel{display:none;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-top:8px}
.panel.open{display:block}
.panel-title{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--navy);margin-bottom:12px}
.fg{margin-bottom:12px}
.fg label{display:block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--text);outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy)}
.fg textarea{resize:vertical;min-height:70px}
.fg-row{display:flex;gap:10px}
.fg-row .fg{flex:1}
.save-btn{background:var(--navy);color:#fff;border:none;border-radius:var(--radius);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:10px 20px;cursor:pointer}
.save-btn:hover{background:#333}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.leave-req{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.leave-req-info{flex:1}
.leave-req-type{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700}
.leave-req-dates{font-size:12px;color:var(--text3)}
.lr-actions{display:flex;gap:6px}
.lr-btn{padding:6px 14px;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:none}
.lr-approve{background:var(--green);color:#111}
.lr-reject{background:#fdf0ef;color:var(--red);border:1px solid #f0c0bb}
.result{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-top:10px;display:none}
.result.show{display:block}
.result.ok{background:#d4edda;color:#155724}
.result.err{background:#fdf0ef;color:var(--red)}
.empty{text-align:center;padding:36px;color:var(--text3)}
.skel{background:linear-gradient(90deg,var(--bg) 25%,var(--border) 50%,var(--bg) 75%);background-size:200% 100%;animation:shim 1.5s infinite;border-radius:6px;height:76px;margin-bottom:14px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
#gate{position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Montserrat',sans-serif;font-size:14px;text-align:center;padding:1.5rem}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:8px;font-size:13px;font-weight:600;display:none;z-index:200}
.toast.show{display:block}
@media(max-width:640px){.act-btn{min-width:calc(50% - 5px)}.fg-row{flex-direction:column;gap:0}}
</style>
</head>
<body>

<div id="gate">Loading your team…</div>

<nav class="nav">
  <div class="nav-left">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 60" height="26"><rect x="0" y="0" width="14" height="60" rx="7" fill="#A2E000"/><rect x="19" y="0" width="14" height="60" rx="7" fill="#4AFD0E"/><rect x="38" y="0" width="14" height="60" rx="7" fill="#1AAA00"/></svg>
    <span class="nav-sec">Manage My Team</span>
  </div>
  <a href="../" class="nav-back">← Back to Portal</a>
</nav>

<div class="shell">
  <div class="page-title">My Team</div>
  <div class="page-sub" id="page-sub">People who report directly to you. Approve leave, log leave, record disciplinary action, or offboard.</div>
  <div id="team-list">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

var CONFIG = {
  azureClientId: '4b515ddf-72b9-43eb-b36b-82fc69296a7c',
  azureTenantId: '77cde95f-930f-495e-89c6-4d2c30f6df21',
  redirectUri:   'https://portal.trilogybpo.com/manageemployees/',
};

var FLOWS = {
  GET_EMPLOYEES:    'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/845f7381bca24e189eb44725203089dd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QrjlEFKXktx5JYxWNb8LgUJAxi8TGzHqLjXh0RriG0U',
  GET_DETAIL:       'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6b82b43d3cc048efb566f7ff40093ad8/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=iqilALe0lU6amkgr8t_Y-zIIUjaefCz2qgeQjEeys9c',
  GET_LEAVE_RECORDS:'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3998c9c42b8f473995fabf9c9f9c7102/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=E2JBILmdXEcO33-MirhSylDi6S5TAi96ghbGknVSzA0',
  APPROVE_LEAVE:    'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3531e6f78a34492882d7ec3b5c878cf2/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=DBkS3MssGKGwq37wcBoXEKphGUgVuM_D5zReB4JkDFE',
  SAVE_LEAVE:       'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2f9acaa0f0254a72a662cbf4541f4da3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=6K_5uXvdvOz7pFfDeQtwhdqfRSxmxz1Ib_sfZHHSD4k',
  SAVE_DISC:        'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/c8ef7ff35f9f45aea1b8844dff8acdf4/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=TB2XdL0cTuf6xXNy3QBIbCORYriYOygOVYPx-Bv_03M',
  OFFBOARD:         'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1533fa3be8884435ba21c152b661377f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=ZaSGCd-qzzgsx0rW6uwyRVkZI2tZmrePaoJ1xDT-d28',
};

var GRAPH_SCOPES = ['User.Read'];
var HOLIDAYS = ['2026-01-01','2026-03-21','2026-04-03','2026-04-06','2026-04-27','2026-05-01','2026-06-16','2026-08-09','2026-09-24','2026-12-16','2026-12-25','2026-12-26'];

var msalApp=null, S={ me:null, myFullName:'', reports:[] };

// ── helpers ──
function unwrap(d){ if(!d) return {}; if(typeof d==='string'){try{return unwrap(JSON.parse(d));}catch(e){return {};}} if(d.body){return typeof d.body==='string'?unwrap(JSON.parse(d.body)):unwrap(d.body);} return d; }
async function flow(url, body){
  var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
  var t=await r.text();
  if(!r.ok){
    var msg='Flow HTTP '+r.status;
    try{ var parsed=unwrap(JSON.parse(t)); if(parsed && parsed.error) msg=parsed.error; }catch(e){}
    throw new Error(msg);
  }
  if(!t||t==='null'||t==='') return {};
  try{return unwrap(JSON.parse(t));}catch(e){return {};}
}
function initials(n){return (n||'?').split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function fmtDate(d){ return !d?'—':new Date(d).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}); }
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
function workingDays(start,end){
  var s=new Date(start),e=new Date(end),n=0;
  for(var d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
    var day=d.getDay(); var iso=d.toISOString().split('T')[0];
    if(day!==0&&day!==6&&HOLIDAYS.indexOf(iso)<0) n++;
  }
  return n;
}

// ── auth ──
async function init(){
  msalApp=new msal.PublicClientApplication({
    auth:{clientId:CONFIG.azureClientId,authority:'https://login.microsoftonline.com/'+CONFIG.azureTenantId,redirectUri:CONFIG.redirectUri},
    cache:{cacheLocation:'sessionStorage',storeAuthStateInCookie:true},
  });
  await msalApp.initialize();
  try{ var resp=await msalApp.handleRedirectPromise(); if(resp){ await load(resp.account); return; } }catch(e){ console.warn(e); }
  var accts=msalApp.getAllAccounts();
  if(accts.length){ await load(accts[0]); }
  else { msalApp.loginRedirect({scopes:GRAPH_SCOPES}); }
}

async function load(account){
  try{
    var email=(account.username||'').toLowerCase();
    var raw=await flow(FLOWS.GET_EMPLOYEES,{action:'get_employees'});
    var all=Array.isArray(raw)?raw:(raw.employees||raw.value||[]);
    S.me=all.filter(function(e){return (e.WorkEmail||'').toLowerCase()===email||(e.PersonalEmail||'').toLowerCase()===email;})[0];
    if(!S.me){ document.getElementById('gate').innerHTML='No employee record found for '+esc(account.username)+'.<br><br><a href="../" style="color:#4AFD0E">← Back to portal</a>'; return; }
    S.myFullName=S.me.FullName||(S.me.FirstName+' '+S.me.LastName);
    S.reports=all.filter(function(e){return (e.ReportsTo||'')===S.myFullName && e.EmployeeID!==S.me.EmployeeID;});
    document.getElementById('gate').style.display='none';
    renderTeam();
    // load pending leave counts in background
    S.reports.forEach(function(r){ loadPending(r); });
  }catch(err){ document.getElementById('gate').textContent='Failed to load: '+err.message; }
}

function renderTeam(){
  if(!S.reports.length){
    document.getElementById('team-list').innerHTML='<div class="empty">👥<br><br>No one reports directly to you right now.</div>';
    document.getElementById('page-sub').textContent='People who report directly to you will appear here.';
    return;
  }
  document.getElementById('team-list').innerHTML=S.reports.map(function(r,i){
    return ''+
    '<div class="emp-card" id="card-'+i+'">'+
      '<div class="emp-head" onclick="toggleCard('+i+')">'+
        '<div class="emp-av">'+initials(r.FirstName+' '+r.LastName)+'</div>'+
        '<div><div class="emp-name">'+esc(r.FirstName+' '+r.LastName)+'</div><div class="emp-role">'+esc(r.JobTitle||'—')+' · '+esc(r.Campaign||'')+'</div></div>'+
        '<div class="emp-pending"><span id="pend-'+i+'"></span><span class="chev">›</span></div>'+
      '</div>'+
      '<div class="emp-body">'+
        '<div class="action-row">'+
          '<button class="act-btn primary" onclick="openPanel('+i+',\'approve\')">✓ Approve Leave</button>'+
          '<button class="act-btn" onclick="openPanel('+i+',\'logleave\')">📋 Log Leave</button>'+
          '<button class="act-btn" onclick="openPanel('+i+',\'disc\')">⚖️ Disciplinary</button>'+
          '<button class="act-btn danger" onclick="openPanel('+i+',\'offboard\')">🚪 Offboard</button>'+
        '</div>'+
        '<div id="panel-'+i+'"></div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleCard(i){ document.getElementById('card-'+i).classList.toggle('open'); }

async function loadPending(r){
  try{
    var res=await flow(FLOWS.GET_LEAVE_RECORDS,{ employee_id:r.EmployeeID });
    var recs=Array.isArray(res)?res:(res.records||res.value||(res.ResultSets&&res.ResultSets.Table1)||(res.resultsets&&res.resultsets.Table1)||[]);
    r._leave=recs;
    var pending=recs.filter(function(x){return (x.Status||x.status||'').toLowerCase()==='pending';});
    r._pending=pending;
    var idx=S.reports.indexOf(r);
    if(pending.length){ document.getElementById('pend-'+idx).innerHTML='<span class="pending-pill">'+pending.length+' pending</span>'; }
  }catch(e){ /* silent */ }
}

// ── panels ──
function openPanel(i, type){
  var r=S.reports[i];
  var el=document.getElementById('panel-'+i);
  // toggle closed if same panel clicked
  if(el.getAttribute('data-type')===type && el.classList.contains('open')){ el.classList.remove('open'); el.setAttribute('data-type',''); return; }
  el.setAttribute('data-type',type);
  el.className='panel open';
  if(type==='approve')   el.innerHTML=panelApprove(i,r);
  if(type==='logleave')  el.innerHTML=panelLogLeave(i,r);
  if(type==='disc')      el.innerHTML=panelDisc(i,r);
  if(type==='offboard')  el.innerHTML=panelOffboard(i,r);
}

// ---- APPROVE LEAVE ----
function panelApprove(i,r){
  var pending=r._pending||[];
  if(!pending.length) return '<div class="panel-title">Approve Leave</div><div style="font-size:13px;color:var(--text3)">No pending leave requests for '+esc(r.FirstName)+'.</div>';
  var rows=pending.map(function(lr,j){
    var type=lr.LeaveType||lr.leave_type||'Leave';
    var sd=lr.StartDate||lr.start_date, ed=lr.EndDate||lr.end_date;
    var days=lr.Days||lr.days||workingDays(sd,ed);
    var id=lr.LeaveID||lr.leave_id||lr.id||'';
    return '<div class="leave-req">'+
      '<div class="leave-req-info"><div class="leave-req-type">'+esc(type)+' · '+days+' day'+(days!=1?'s':'')+'</div>'+
      '<div class="leave-req-dates">'+fmtDate(sd)+' → '+fmtDate(ed)+(lr.Reason||lr.reason?' · '+esc(lr.Reason||lr.reason):'')+'</div></div>'+
      '<div class="lr-actions">'+
        '<button class="lr-btn lr-approve" onclick="decideLeave('+i+','+j+',\'Approved\')">Approve</button>'+
        '<button class="lr-btn lr-reject" onclick="decideLeave('+i+','+j+',\'Rejected\')">Reject</button>'+
      '</div></div>';
  }).join('');
  return '<div class="panel-title">Pending Leave — '+esc(r.FirstName)+'</div>'+rows+'<div class="result" id="res-'+i+'"></div>';
}

async function decideLeave(i,j,decision){
  var r=S.reports[i]; var lr=r._pending[j];
  var res=document.getElementById('res-'+i);
  var id=lr.LeaveID||lr.leave_id||lr.id||'';
  try{
    await flow(FLOWS.APPROVE_LEAVE,{
      leave_id: String(id),
      status: decision,
      approved_by: S.myFullName,
      employee_id: r.EmployeeID,
      employee_name: r.FirstName+' '+r.LastName,
      employee_email: r.WorkEmail||r.PersonalEmail||'',
      campaign: r.Campaign||'',
      job_title: r.JobTitle||'',
      leave_type: lr.LeaveType||lr.leave_type||'',
      start_date: lr.StartDate||lr.start_date||'',
      end_date: lr.EndDate||lr.end_date||'',
      days: String(lr.Days||lr.days||''),
      reason: lr.Reason||lr.reason||'',
    });
    res.className='result ok show'; res.textContent=decision==='Approved'?'Leave approved ✓':'Leave rejected';
    // refresh pending for this person
    lr._done=true;
    await loadPending(r);
    setTimeout(function(){ openPanel(i,'approve'); },900);
  }catch(e){ res.className='result err show'; res.textContent='Failed: '+e.message; }
}

// ---- LOG LEAVE (on behalf) ----
function panelLogLeave(i,r){
  return '<div class="panel-title">Log Leave for '+esc(r.FirstName)+'</div>'+
    '<div class="fg"><label>Leave type</label><select id="ll-type-'+i+'">'+
      '<option>Annual</option><option>Sick</option><option>Family Responsibility</option><option>Parental</option><option>Unpaid</option></select></div>'+
    '<div class="fg-row"><div class="fg"><label>Start date</label><input type="date" id="ll-start-'+i+'"></div>'+
      '<div class="fg"><label>End date</label><input type="date" id="ll-end-'+i+'"></div></div>'+
    '<div class="fg"><label>Reason / note</label><textarea id="ll-reason-'+i+'" placeholder="Optional note"></textarea></div>'+
    '<button class="save-btn" id="ll-btn-'+i+'" onclick="submitLogLeave('+i+')">Log leave</button>'+
    '<div class="result" id="llres-'+i+'"></div>';
}

async function submitLogLeave(i){
  var r=S.reports[i];
  var type=document.getElementById('ll-type-'+i).value;
  var sd=document.getElementById('ll-start-'+i).value;
  var ed=document.getElementById('ll-end-'+i).value;
  var reason=document.getElementById('ll-reason-'+i).value.trim();
  var res=document.getElementById('llres-'+i);
  if(!sd||!ed){ res.className='result err show'; res.textContent='Please choose start and end dates.'; return; }
  if(new Date(ed)<new Date(sd)){ res.className='result err show'; res.textContent='End date is before start date.'; return; }
  var days=workingDays(sd,ed);
  var btn=document.getElementById('ll-btn-'+i); btn.disabled=true; btn.textContent='Logging…';
  try{
    await flow(FLOWS.SAVE_LEAVE,{
      employee_id: r.EmployeeID,
      employee_name: r.FirstName+' '+r.LastName,
      employee_email: r.WorkEmail||r.PersonalEmail||'',
      campaign: r.Campaign||'',
      job_title: r.JobTitle||'',
      leave_type: type,
      start_date: sd,
      end_date: ed,
      days: String(days),
      reason: reason,
      status: 'Approved',               // manager logging on behalf = pre-approved
      approved_by: S.myFullName,
      manager_email: S.me.WorkEmail||'',
      requested_by: S.myFullName,
    });
    res.className='result ok show'; res.textContent=type+' leave logged for '+r.FirstName+' ('+days+' working day'+(days!=1?'s':'')+') ✓';
    document.getElementById('ll-reason-'+i).value='';
  }catch(e){ res.className='result err show'; res.textContent='Failed: '+e.message; }
  btn.disabled=false; btn.textContent='Log leave';
}

// ---- DISCIPLINARY ----
function panelDisc(i,r){
  var today=new Date().toISOString().split('T')[0];
  return '<div class="panel-title">Disciplinary — '+esc(r.FirstName)+'</div>'+
    '<div class="fg-row"><div class="fg"><label>Category</label><select id="dc-cat-'+i+'">'+
      '<option>Verbal Warning</option><option>Written Warning</option><option>Final Written Warning</option>'+
      '<option>Misconduct</option><option>Poor Performance</option><option>Attendance</option><option>Other</option></select></div>'+
      '<div class="fg"><label>Incident date</label><input type="date" id="dc-date-'+i+'" value="'+today+'"></div></div>'+
    '<div class="fg"><label>Description</label><textarea id="dc-desc-'+i+'" placeholder="What happened?"></textarea></div>'+
    '<div class="fg"><label>Outcome / action taken</label><textarea id="dc-out-'+i+'" placeholder="e.g. Written warning issued, valid 6 months"></textarea></div>'+
    '<button class="save-btn" id="dc-btn-'+i+'" onclick="submitDisc('+i+')">Save disciplinary record</button>'+
    '<div class="result" id="dcres-'+i+'"></div>';
}

async function submitDisc(i){
  var r=S.reports[i];
  var cat=document.getElementById('dc-cat-'+i).value;
  var date=document.getElementById('dc-date-'+i).value;
  var desc=document.getElementById('dc-desc-'+i).value.trim();
  var out=document.getElementById('dc-out-'+i).value.trim();
  var res=document.getElementById('dcres-'+i);
  if(!desc){ res.className='result err show'; res.textContent='Please describe the incident.'; return; }
  var btn=document.getElementById('dc-btn-'+i); btn.disabled=true; btn.textContent='Saving…';
  try{
    await flow(FLOWS.SAVE_DISC,{
      employee_id: r.EmployeeID,
      employee_name: r.FirstName+' '+r.LastName,
      incident_date: date,
      category: cat,
      description: desc,
      outcome: out,
      issued_by: S.myFullName,
      status: 'Active',
    });
    res.className='result ok show'; res.textContent='Disciplinary record saved for '+r.FirstName+' ✓';
    document.getElementById('dc-desc-'+i).value=''; document.getElementById('dc-out-'+i).value='';
  }catch(e){ res.className='result err show'; res.textContent='Failed: '+e.message; }
  btn.disabled=false; btn.textContent='Save disciplinary record';
}

// ---- OFFBOARD ----
var RESIGNATION_REASONS = [
  'Better Offer Received','Location Issues','Transport Issues','Management Issues'
];

function panelOffboard(i,r){
  var today=new Date().toISOString().split('T')[0];
  var reasonOpts=RESIGNATION_REASONS.map(function(x){return '<option>'+x+'</option>';}).join('');
  return '<div class="panel-title">Offboard — '+esc(r.FirstName+' '+r.LastName)+'</div>'+
    '<div style="background:#fdf0ef;border:1px solid #f5c6c2;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:14px">⚠️ This starts the offboarding process. HR will complete the exit from here — this step does not deactivate the employee.</div>'+
    '<div class="fg-row"><div class="fg"><label>Exit type</label><select id="ob-exittype-'+i+'" onchange="toggleResignFields('+i+')">'+
      '<option value="Resigned">Resigned</option><option value="Dismissed">Dismissed</option>'+
      '<option value="ContractEnded">Contract Ended</option><option value="ProbationFailed">Probation Failed</option></select></div>'+
      '<div class="fg"><label>Last working day</label><input type="date" id="ob-lwd-'+i+'" value="'+today+'"></div></div>'+
    '<div id="ob-resignwrap-'+i+'">'+
      '<div class="fg"><label>Resignation reason</label><select id="ob-resignreason-'+i+'">'+reasonOpts+'</select></div>'+
      '<div class="fg"><label>Additional detail (optional)</label><textarea id="ob-notes-'+i+'" placeholder="Any extra context"></textarea></div>'+
    '</div>'+
    '<div class="fg"><label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;font-weight:600;color:var(--text)"><input type="checkbox" id="ob-rehire-'+i+'" style="width:auto"> Eligible for rehire</label></div>'+
    '<button class="save-btn" id="ob-btn-'+i+'" style="background:var(--red)" onclick="submitOffboard('+i+')">Start offboarding</button>'+
    '<div class="result" id="obres-'+i+'"></div>';
}

function toggleResignFields(i){
  var exitType=document.getElementById('ob-exittype-'+i).value;
  document.getElementById('ob-resignwrap-'+i).style.display = exitType==='Resigned' ? '' : 'none';
}

async function submitOffboard(i){
  var r=S.reports[i];
  var exitType=document.getElementById('ob-exittype-'+i).value;
  var lwd=document.getElementById('ob-lwd-'+i).value;
  var isResigned=exitType==='Resigned';
  var resignReason=isResigned?document.getElementById('ob-resignreason-'+i).value:'';
  var notes=isResigned?document.getElementById('ob-notes-'+i).value.trim():'';
  var rehireEligible=document.getElementById('ob-rehire-'+i).checked;
  var res=document.getElementById('obres-'+i);
  if(FLOWS.OFFBOARD.indexOf('PASTE_')===0){ res.className='result err show'; res.textContent='Offboarding flow not configured yet — see setup guide.'; return; }
  if(!confirm('Start offboarding for '+r.FirstName+' '+r.LastName+'? HR and IT will be notified.')) return;
  var btn=document.getElementById('ob-btn-'+i); btn.disabled=true; btn.textContent='Processing…';
  try{
    await flow(FLOWS.OFFBOARD,{
      employee_id: r.EmployeeID,
      employee_name: r.FirstName+' '+r.LastName,
      exit_type: exitType,
      last_working_day: lwd,
      resignation_reason: resignReason,
      exit_comments: notes,
      rehire_eligible: rehireEligible,
      initiated_by: S.myFullName,
    });
    res.className='result ok show'; res.textContent='Offboarding started for '+r.FirstName+'. HR and IT have been notified.';
  }catch(e){ res.className='result err show'; res.textContent='Failed: '+e.message; }
  btn.disabled=false; btn.textContent='Start offboarding';
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
